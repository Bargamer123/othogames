<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host — Do You Know Me?!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a class="home-btn" id="hostHomeBtn" href="index.html" aria-label="Back to home" title="Back to home">🏠</a>
  <button class="mute-btn" id="muteBtn" aria-label="Mute sounds" title="Mute sounds">🔊</button>
  <main class="wrap">
    <h1 class="logo">Do You <span class="tilt">Know</span> Me?!</h1>

    <!-- LOBBY -->
    <section id="view-lobby" class="hidden">
      <div class="center">
        <div class="room-code" id="roomCode">····</div>
        <p class="join-hint">Join in any browser at <strong id="joinURL"></strong> with this code</p>
        <div class="mt">
          <button class="btn btn--aqua" id="hostJoinBtn">I'm playing too — open my controller</button>
        </div>
      </div>
      <div class="card">
        <h2 class="center">Who's here <span id="playerCount"></span></h2>
        <div class="player-grid" id="lobbyPlayers"></div>
      </div>
      <div class="card">
        <h2 class="center">Game settings</h2>
        <div class="setting">
          <label for="roundsSlider">Rounds: <output id="roundsOut">10</output></label>
          <input type="range" class="setting-range" id="roundsSlider" min="3" max="30" step="1" value="10" />
        </div>
        <div class="setting">
          <label for="goalSlider">Points to win: <output id="goalOut">600</output> <span class="setting-hint">(first to reach this wins early)</span></label>
          <input type="range" class="setting-range" id="goalSlider" min="200" max="2000" step="50" value="600" />
        </div>
        <div class="btn-row mt">
          <button class="btn btn--coral btn--big" id="startBtn" disabled>Waiting for players…</button>
        </div>
      </div>
    </section>

    <!-- ANSWERING -->
    <section id="view-answering" class="hidden">
      <div class="card card--stage">
        <span class="pill" id="roundPillA"></span>
        <div class="mt" id="spotlightIntroA"></div>
        <h2 class="question" id="questionA"></h2>
        <div class="spectrum-labels"><span id="leftA"></span><span id="rightA"></span></div>
        <div class="spectrum"></div>
        <p class="status" style="color: var(--ink-soft);" id="answerWait"></p>
        <div class="btn-row">
          <button class="btn btn--ghost" id="skipSpotlightBtn">Skip this player</button>
        </div>
      </div>
      <div class="player-grid" id="scoreboardA"></div>
    </section>

    <!-- GUESSING -->
    <section id="view-guessing" class="hidden">
      <div class="card card--stage">
        <span class="pill" id="roundPillG"></span>
        <h2 class="question" id="questionG"></h2>
        <div class="spectrum-labels"><span id="leftG"></span><span id="rightG"></span></div>
        <div class="spectrum"></div>
        <p class="status" style="color: var(--ink-soft);" id="guessProgress"></p>
        <div class="btn-row">
          <button class="btn" id="revealNowBtn">Reveal now</button>
        </div>
      </div>
      <div class="player-grid" id="scoreboardG"></div>
    </section>

    <!-- REVEAL -->
    <section id="view-reveal" class="hidden">
      <div class="card card--stage">
        <span class="pill" id="roundPillR"></span>
        <h2 class="question" id="questionR"></h2>
        <div class="spectrum-block">
          <div class="spectrum-labels"><span id="leftR"></span><span id="rightR"></span></div>
          <div class="spectrum" id="revealSpectrum" style="height: 34px;"></div>
        </div>
        <div id="revealResults" class="mt" style="text-align:left;"></div>
        <div class="btn-row mt">
          <button class="btn btn--coral btn--big" id="nextRoundBtn">Next round</button>
        </div>
      </div>
    </section>

    <!-- FINAL -->
    <section id="view-final" class="hidden">
      <div class="card card--stage">
        <h2>🏆 Final standings</h2>
        <div id="finalStandings" class="mt" style="text-align:left;"></div>
        <div class="btn-row mt">
          <button class="btn btn--coral btn--big" id="playAgainBtn">Play again</button>
        </div>
      </div>
    </section>

    <p class="status" id="hostStatus"></p>
  </main>

  <script type="module" src="js/host.js"></script>
</body>
</html>
